<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Árvores</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <h1 class="page-header-title">Quiz sobre Árvores</h1>
    </header>

    <section class="main-card">
      <section id="quizSection" aria-live="polite">
        <div id="quiz"></div>
      </section>

      <section id="finalScore" class="final-screen final-score-card" aria-live="polite" aria-labelledby="final-title">
        <h2 id="final-title" class="final-title">Quiz Finalizado!</h2>
        <p class="final-text">
          Você acertou <span id="score" class="score-number"></span> de 15 questões. Continue explorando o campus e veja quantas espécies você já consegue reconhecer de primeira.
        </p>
        <div class="actions actions-center">
          <a id="homeBtn" class="action-btn" href="home.html">Voltar para a Home</a>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
